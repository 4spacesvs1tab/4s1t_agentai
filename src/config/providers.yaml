# =============================================================================
# 4S1T Agent AI — LLM Provider Configuration
#
# Active provider is selected by the ACTIVE_PROVIDER environment variable.
# Default: nano_gpt
#
# To switch provider:
#   export ACTIVE_PROVIDER=openrouter
#
# All model IDs listed here are defaults. Override individual agent_preferences
# mappings by editing this file — no GUI required.
#
# Fields per provider:
#   catalog_strategy: "api"    → fetch model list from GET /models at runtime
#                    "static"  → use agent_preferences list only (no API call)
#   model_filter:    "all"     → return all models from the API
#                    "free"    → keep only models whose ID ends with ":free"
#                    "pro"     → keep only models whose ID does NOT end with ":free"
# =============================================================================

# Which provider section is used at startup (env override: ACTIVE_PROVIDER)
active: nano_gpt

providers:

  # ---------------------------------------------------------------------------
  # Nano-GPT — default provider (OpenAI-compatible)
  # Docs: https://docs.nano-gpt.com/introduction
  # ---------------------------------------------------------------------------
  nano_gpt:
    display_name: "Nano-GPT"
    base_url: "https://nano-gpt.com/api/v1"
    api_key_env: "NANO_GPT_API_KEY"
    extra_headers: {}
    catalog_strategy: api
    model_filter: all
    agent_preferences:
      reasoning:
        - "moonshotai/kimi-k2.5:thinking"      # Best for complex reasoning and decomposition
      fast:
        - "moonshotai/kimi-k2.5"               # Fastest response, large context
      coding:
        - "qwen3-coder"                         # Code generation and analysis
      general:
        - "zai-org/glm-4.7"                     # Balanced general-purpose

  # ---------------------------------------------------------------------------
  # OpenRouter — multi-provider gateway (OpenAI-compatible)
  # Docs: https://openrouter.ai/docs/guides/overview
  # Obtain API key: https://openrouter.ai/keys
  # Model IDs use format: provider/model-name
  # ---------------------------------------------------------------------------
  openrouter:
    display_name: "OpenRouter"
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: "OPENROUTER_API_KEY"
    # No attribution headers — omitting HTTP-Referer and X-Title to avoid
    # identifying this application to the provider (privacy requirement §3)
    extra_headers: {}
    # Fetch live model list from OpenRouter API; keep only free (:free) models
    catalog_strategy: api
    model_filter: free
    # Free-tier models (":free" suffix = no credits required)
    # See all free models at: https://openrouter.ai/models?q=:free
    agent_preferences:
      # --- preference slots (used by ModelSelector internally) ---
      reasoning:
        - "google/gemma-3-27b-it:free"              # Gemma 3 27B — 131k ctx, best available free
      fast:
        - "nvidia/nemotron-nano-9b-v2:free"         # Nemotron 9B — 128k ctx, fast + free
      coding:
        - "nvidia/nemotron-3-nano-30b-a3b:free"     # Nemotron 30B — 256k ctx, free
      general:
        - "google/gemma-3-12b-it:free"              # Gemma 3 12B — 32k ctx, balanced, free
      # --- additional free models selectable in the chat UI ---
      auto_free:
        - "openrouter/free"                          # Auto — picks best available free model
      llama_70b:
        - "meta-llama/llama-3.3-70b-instruct:free"  # Llama 3.3 70B — 128k ctx, strong general
      deepseek_r1:
        - "deepseek/deepseek-r1:free"               # DeepSeek R1 — 163k ctx, chain-of-thought
      qwen_72b:
        - "qwen/qwen-2.5-72b-instruct:free"         # Qwen 2.5 72B — 131k ctx, multilingual
      mistral_7b:
        - "mistralai/mistral-7b-instruct:free"       # Mistral 7B — 32k ctx, lightweight/fast
      gemma3_4b:
        - "google/gemma-3-4b-it:free"               # Gemma 3 4B — 131k ctx, smallest/fastest

  # ---------------------------------------------------------------------------
  # Local Ollama via Open WebUI on Start9 server
  # Open WebUI v0.6.30 wrapping Ollama v0.11.10
  # API key: generate at https://<start9-local>/  → Profile → Settings → Account → API Keys
  # ssl_verify: false because Start9 uses a self-signed local CA
  # ---------------------------------------------------------------------------
  local_ollama:
    display_name: "Local Ollama (Start9)"
    base_url: "https://YOUR_OLLAMA_HOST.local/ollama/v1"  # placeholder — real URL in .env
    base_url_env: "LOCAL_OLLAMA_BASE_URL"                 # overrides base_url at runtime
    api_key_env: "LOCAL_OLLAMA_API_KEY"
    ssl_verify: false
    skip_tor: true         # .local mDNS address — Tor exits cannot route to LAN
    supports_tools: false  # Ollama base models don't support function calling
    max_concurrent: 1      # R500 8 GB RAM / CPU-only — serialise requests to avoid OOM
    timeout: 1800          # 30 min ceiling; deepseek-r1:8b can take 10-20 min on CPU
    extra_headers: {}
    # Fetch all installed models from Ollama API
    catalog_strategy: api
    model_filter: all
    # Models installed in Ollama — check with: GET /ollama/v1/models (with Bearer token)
    # Ordered fastest-first; deepseek-r1 kept for reasoning only (very slow on CPU)
    agent_preferences:
      reasoning:
        - "deepseek-r1:8b"   # DeepSeek R1 8B — chain-of-thought (slow, ~10-20 min on CPU)
      fast:
        - "mistral:7b"       # Mistral 7B — fastest general-purpose model on R500
        - "llama3.1:8b"      # fallback
      coding:
        - "qwen3:8b"         # Qwen3 8B — better at structured output
        - "mistral:7b"       # fallback
      general:
        - "mistral:7b"       # fastest; use for NIP-17 chat
        - "llama3.1:8b"      # fallback

  # ---------------------------------------------------------------------------
  # OpenAI — direct API (OpenAI-compatible, obviously)
  # Docs: https://platform.openai.com/docs/api-reference
  # Obtain API key: https://platform.openai.com/api-keys
  # ---------------------------------------------------------------------------
  openai:
    display_name: "OpenAI"
    base_url: "https://api.openai.com/v1"
    api_key_env: "OPENAI_API_KEY"
    extra_headers: {}
    catalog_strategy: api
    model_filter: all
    agent_preferences:
      reasoning:
        - "o1-mini"       # Reasoning model (o1 family)
      fast:
        - "gpt-4o-mini"   # Fast and cost-efficient
      coding:
        - "gpt-4o"        # Best for code tasks
      general:
        - "gpt-4o-mini"   # General default
