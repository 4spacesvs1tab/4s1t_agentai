{% extends "auth_base.html" %}
{% block title %}{{ t('mfa.verify_title') }} — 4S1T Agent AI{% endblock %}

{% block content %}
<div class="v05-auth-card">
    <div class="v05-auth-logo">
        <div class="v05-auth-logo-icon">4s1t</div>
        <div class="v05-auth-logo-text">
            <h1>{{ t('mfa.verify_title') }}</h1>
            <p>{{ t('mfa.verify_subtitle') }}</p>
        </div>
    </div>

    <p style="text-align:center; color:var(--t-2); font-size:13px; margin-bottom:20px;">
        {{ t('mfa.enter_code') }}
    </p>

    <form id="mfa-form" class="v05-auth-form">
        <div class="v05-auth-field">
            <label for="mfa-code">{{ t('mfa.verify_code_label') }}</label>
            <input type="text" id="mfa-code" name="verification_code"
                   maxlength="6" pattern="[0-9]{6}" required
                   placeholder="000000" autofocus
                   style="text-align:center; font-size:22px; letter-spacing:.6em; font-variant-numeric:tabular-nums;">
            <small style="color:var(--t-3); font-size:11px; margin-top:5px; display:block; text-align:center;">
                {{ t('mfa.code_hint') }}
            </small>
        </div>

        <button type="submit" class="btn-signin" id="mfa-submit-btn">{{ t('mfa.verify_submit') }}</button>

        <button type="button" onclick="cancelMfa()"
                style="width:100%; margin-top:8px; padding:10px; background:transparent;
                       border:1px solid var(--b-med); border-radius:var(--r-sm);
                       color:var(--t-3); font-size:13px; cursor:pointer;">
            {{ t('mfa.cancel') }}
        </button>
    </form>
</div>

<script>
var _mfa_i18n = {
    verifying:     '{{ t("mfa.verifying_short") }}',
    verify_submit: '{{ t("mfa.verify_submit") }}',
    invalid_code:  '{{ t("mfa.invalid_code_short") }}',
    network_error: '{{ t("mfa.network_error_short") }}',
};

document.addEventListener('DOMContentLoaded', function() {
    var token = sessionStorage.getItem('mfa_session_token');
    if (!token) { window.location.href = '/login'; return; }

    var form = document.getElementById('mfa-form');
    var btn  = document.getElementById('mfa-submit-btn');

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        var code = document.getElementById('mfa-code').value;
        btn.textContent = _mfa_i18n.verifying;
        btn.disabled = true;

        fetch('/auth/verify-2fa', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ session_token: token, verification_code: code })
        })
        .then(function(r) { return r.json(); })
        .then(function(result) {
            if (result.access_token) {
                localStorage.setItem('access_token', result.access_token);
                sessionStorage.removeItem('mfa_session_token');
                window.location.href = '/dashboard';
            } else {
                alert(result.detail || _mfa_i18n.invalid_code);
                btn.textContent = _mfa_i18n.verify_submit;
                btn.disabled = false;
            }
        })
        .catch(function(error) {
            alert(_mfa_i18n.network_error + ' ' + error.message);
            btn.textContent = _mfa_i18n.verify_submit;
            btn.disabled = false;
        });
    });

    document.getElementById('mfa-code').addEventListener('input', function(e) {
        e.target.value = e.target.value.replace(/[^0-9]/g, '');
        if (e.target.value.length === 6) form.dispatchEvent(new Event('submit'));
    });
});

function cancelMfa() {
    sessionStorage.removeItem('mfa_session_token');
    localStorage.removeItem('access_token');
    window.location.href = '/login';
}
</script>
{% endblock %}
